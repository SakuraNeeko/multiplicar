<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Multiplicar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="multiplicar.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>✨ Multiplicador Mágico ✨</h1>
            <p class="instrucciones">Ingresa el número que desees y descubre su tabla de multiplicar (ﾉ◕ヮ◕)ﾉ*:･ﾟ✧</p>
            
            <div class="controles">
                <input type="number" id="numero" placeholder="Ej: 8">
                <button onclick="generarTablas()">PROBAR</button>
            </div>
        </header>

        <main>
            <div class="tabla" id="contenedor">
                <div class="mensaje-inicial">Esperando tu número... (づ ◕‿◕ )づ</div>
            </div>
        </main>

        <footer>
            <p>Creado por: Bryan 🌸</p>
        </footer>
    </div>
    <script src="multiplicar.js"></script>
</body>
</html>
